<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Journal System</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
    form { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; }
    input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    ul { list-style: none; padding: 0; }
    li { border: 1px solid #eee; padding: 10px; margin-bottom: 10px; }
    .analysis { background: #f0f8ff; padding: 10px; margin-top: 10px; }
    .error { background: #ffebee; color: #c62828; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [userId, setUserId] = useState('user1');
      const [ambience, setAmbience] = useState('forest');
      const [text, setText] = useState('');
      const [entries, setEntries] = useState([]);
      const [insights, setInsights] = useState({});
      const [analysis, setAnalysis] = useState(null);
      const [selectedText, setSelectedText] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

const API_BASE = '/api';

      const apiCall = async (url, options = {}) => {
        const res = await fetch(url, options);
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(errText || `HTTP ${res.status}`);
        }
        return res.json();
      };

      const loadEntries = async () => {
        try {
          setLoading(true);
          const data = await apiCall(`${API_BASE}/entries/${userId}`);
          setEntries(data);
          setError('');
        } catch (err) {
          console.error('Entries error:', err);
          setError(err.message);
        }
        setLoading(false);
      };

      const loadInsights = async () => {
        try {
          setLoading(true);
          const data = await apiCall(`${API_BASE}/insights/${userId}`);
          setInsights(data);
          setError('');
        } catch (err) {
          console.error('Insights error:', err);
          setError(err.message);
        }
        setLoading(false);
      };

      const submitEntry = async (e) => {
        e.preventDefault();
        setError('');
        try {
          setLoading(true);
          await apiCall(`${API_BASE}/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, ambience, text })
          });
          setText('');
          loadEntries();
          loadInsights();
        } catch (err) {
          console.error('Submit error:', err);
          setError(err.message);
        }
        setLoading(false);
      };

      const analyzeText = async (txt) => {
        setError('');
        try {
          setLoading(true);
          const data = await apiCall(`${API_BASE}/analyze`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: txt })
          });
          setAnalysis(data);
          setSelectedText(txt);
        } catch (err) {
          console.error('Analyze error:', err);
          setError('Analyze failed: ' + err.message + '. Check backend console/key.');
        }
        setLoading(false);
      };

      useEffect(() => {
        if (userId) {
          loadEntries();
          loadInsights();
        }
      }, [userId]);

      return (
        <div>
          <h1>AI-Assisted Journal System</h1>
          
          {error && <div className="error">{error}</div>}
          
          <form onSubmit={submitEntry}>
            <h3>New Entry</h3>
            <input
              value={userId}
              onChange={(e) => setUserId(e.target.value)}
              placeholder="User ID"
            />
            <select value={ambience} onChange={(e) => setAmbience(e.target.value)}>
              <option value="forest">Forest</option>
              <option value="ocean">Ocean</option>
              <option value="mountain">Mountain</option>
            </select>
            <textarea
              value={text}
              onChange={(e) => setText(e.target.value)}
              placeholder="Journal text..."
              rows="4"
            />
            <button type="submit" disabled={loading}>Submit Entry</button>
          </form>

          <button onClick={loadEntries} disabled={loading}>View Entries</button>
          <button onClick={loadInsights} disabled={loading}>View Insights</button>

          {loading && <p>Loading...</p>}

          <h3>Entries ({entries.length})</h3>
          <ul>
            {entries.map(entry => (
              <li key={entry.id}>
                <strong>{entry.ambience}</strong> - {new Date(entry.createdAt).toLocaleString()} 
                <p>{entry.text}</p>
                {entry.emotion && <span>Emotion: {entry.emotion}</span>}
                <button onClick={() => analyzeText(entry.text)}>Analyze</button>
              </li>
            ))}
          </ul>

          {analysis && (
            <div className="analysis">
              <h4>Analysis for "{selectedText.substring(0,50)}..."</h4>
              <p><strong>Emotion:</strong> {analysis.emotion}</p>
              <p><strong>Keywords:</strong> {analysis.keywords ? analysis.keywords.join(', ') : 'N/A'}</p>
              <p><strong>Summary:</strong> {analysis.summary}</p>
            </div>
          )}

          <h3>Insights</h3>
          <pre>{JSON.stringify(insights, null, 2)}</pre>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
