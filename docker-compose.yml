version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend/db.sqlite:/app/db.sqlite
    depends_on:
      - redis # optional

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

# Run: docker-compose up --build

